<div class="flex h-screen bg-gray-100 overflow-hidden">
  <div
    *ngIf="isSidebarOpen"
    (click)="closeSidebar()"
    class="fixed inset-0 z-20 bg-black opacity-50 transition-opacity lg:hidden"
  ></div>

  <aside
    [class.translate-x-0]="isSidebarOpen"
    [class.-translate-x-full]="!isSidebarOpen"
    class="fixed inset-y-0 left-0 z-30 w-64 bg-white shadow-md flex flex-col transition-transform duration-300 transform lg:static lg:translate-x-0"
  >
    <div
      class="p-6 text-xl font-bold text-red-600 border-b flex justify-between items-center"
    >
       OMS
      <button (click)="closeSidebar()" class="lg:hidden text-gray-500">
        <i class="icon-close"></i>
      </button>
    </div>

    <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
      <a
        *appHasRole="'CUSTOMER'"
        routerLink="customer/product"
        (click)="closeSidebar()"
        class="block p-3 rounded hover:bg-gray-100"
      >
        <i class="icon-plus mr-2 text-blue-500"></i> Product
      </a>
      <a
        routerLink="orders"
        (click)="closeSidebar()"
        class="block p-3 rounded hover:bg-gray-100 border-l-4 border-transparent active-link"
      >
        <i class="icon-list mr-2"></i> All Orders
      </a>
      <a
        *appHasRole="'ADMIN'"
        routerLink="inventory"
        (click)="closeSidebar()"
        class="block p-3 rounded hover:bg-gray-100"
      >
        <i class="icon-box mr-2 text-green-500"></i> Stock Management
      </a>


    </nav>

    <div class="p-4 border-t bg-gray-50">
      <div class="text-sm font-semibold text-gray-700">{{ username }}</div>
      <div class="text-xs text-gray-500 uppercase">{{ role }}</div>
      <button
        (click)="onLogout()"
        class="mt-2 text-red-500 text-xs hover:underline"
      >
        Sign Out
      </button>
    </div>
  </aside>

  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <header
      class="h-16 bg-white shadow-sm flex items-center justify-between px-4 lg:px-8"
    >
      <div class="flex items-center">
        <button
          (click)="toggleSidebar()"
          class="p-2 mr-4 text-gray-600 lg:hidden focus:outline-none"
        >
       <span class="material-symbols-outlined">
menu
</span>
          <span class="sr-only">Open Sidebar</span>
        </button>
        <h2 class="text-md lg:text-lg font-medium text-gray-800 truncate">
          Order Management System
        </h2>
      </div>

      <div class="flex items-center space-x-4">
        <span class="hidden sm:inline text-sm text-gray-600 italic"
          >Welcome, Khun Bank</span
        >
      </div>
    </header>

    <main class="flex-1 overflow-x-hidden overflow-y-auto p-4 lg:p-8">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
