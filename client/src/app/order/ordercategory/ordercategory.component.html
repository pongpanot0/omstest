<div class=" mx-auto p-6">
 <div class="flex gap-2 overflow-x-auto pb-4 mb-6 scrollbar-hide p-1">
  <button
    (click)="selectCategory('All Items')"
    [class]="selectedCategory === 'All Items'
      ? 'px-6 py-2 bg-red-600 text-white rounded-full font-medium whitespace-nowrap shadow-md'
      : 'px-6 py-2 bg-white text-slate-600 border border-slate-200 rounded-full font-medium whitespace-nowrap hover:bg-slate-50'"
  >
    All Items
  </button>

  <button *ngFor="let cat of ['Meat & Poultry', 'Dairy', 'Pantry & Oils', 'Seafood']"
    (click)="selectCategory(cat)"
    [class]="selectedCategory === cat
      ? 'px-6 py-2 bg-red-600 text-white rounded-full font-medium whitespace-nowrap shadow-md'
      : 'px-6 py-2 bg-white text-slate-600 border border-slate-200 rounded-full font-medium whitespace-nowrap hover:bg-slate-50'"
  >
    {{ cat }}
  </button>

  <div class="relative w-full min-w-[250px]">
    <input
      type="text"
      (input)="onSearch($event)"
      placeholder="Search products or SKU..."
      class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-2xl shadow-sm focus:ring-2 focus:ring-red-500 outline-none transition-all"
    />
    <span class="absolute left-3 top-3.5 text-slate-400">🔍</span>
  </div>
</div>
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
    <div
      *ngFor="let p of filteredProducts"
      class="bg-white border border-slate-100 rounded-3xl p-4 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all group"
    >
      <div class="relative h-48 bg-slate-50 rounded-2xl mb-4 overflow-hidden">

        <img
          [src]="p.image"
          class="w-full h-full object-contain p-4 mix-blend-multiply"
        />
      </div>

      <h3 class="font-bold text-slate-800 leading-tight h-10 mb-1">
        {{ p.name }}
      </h3>
      <p class="text-xs text-slate-400 mb-4">{{ p.category }}</p>

      <div class="flex justify-between items-center mt-auto">
        <div>
          <p class="text-[10px] text-slate-400 font-bold uppercase">Price</p>
          <p class="text-lg font-black text-slate-900">
            {{ p.price | number }}
          </p>
        </div>
        <button
          (click)="addToCart(p)"
          class="w-10 h-10 bg-slate-900 text-white rounded-xl flex items-center justify-center hover:bg-red-600 active:scale-90 transition-all shadow-lg shadow-slate-200"
        >
          +
        </button>
      </div>
    </div>
  </div>

  <div
    *ngIf="cartCount > 0"
    class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-2xl bg-slate-900 text-white p-4 rounded-3xl shadow-2xl shadow-slate-400 flex justify-between items-center animate-in slide-in-from-bottom-10"
  >
    <div class="flex items-center gap-4 ml-2">
      <div class="relative">
        <span class="material-symbols-outlined">shopping_cart</span>
        <span
          class="absolute -top-2 -right-2 bg-red-600 text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold"
          >{{ cartCount }}</span
        >
      </div>
      <div>
        <p
          class="text-[10px] text-slate-400 uppercase font-bold tracking-widest"
        >
          Total Estimated
        </p>
        <p class="text-lg font-bold">{{ cartTotal | number }}</p>
      </div>
    </div>
    <button
      (click)="goToCreateOrder()"
      class="bg-red-600 px-8 py-3 rounded-2xl font-bold hover:bg-red-700 transition-all flex items-center gap-2"
    >
      Continue to Order
      <span class="material-symbols-outlined text-sm">arrow_forward</span>
    </button>
  </div>
</div>
