<div class="min-h-[80vh] flex items-center justify-center p-6">
  <div class="max-w-md w-full bg-white rounded-3xl p-8 shadow-xl border border-slate-50 text-center animate-in zoom-in-95 duration-300">
    <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
      <span class="material-symbols-outlined text-4xl">check_circle</span>
    </div>
    <h1 class="text-2xl font-black text-slate-800 mb-2">Order Confirmed!</h1>
    <p class="text-slate-500 text-sm mb-8">ขอบคุณที่เลือกใช้บริการจาก Jagota<br>ออเดอร์หมายเลข <span class="font-bold text-slate-800">#ORD-202603-99</span> เรียบร้อยแล้ว</p>

    <div class="space-y-3">
      <button [routerLink]="['/dashboard/customer/detail', orderId]"
              class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-slate-800 transition-all">
        View Order Detail
      </button>
      <button routerLink="/dashboard/customer/product"
              class="w-full py-4 bg-white text-slate-600 font-bold hover:bg-slate-50 transition-all">
        Back to Shopping
      </button>
    </div>
  </div>
</div>
