<div
  class="overflow-x-auto rounded-xl border border-slate-200 bg-white shadow-sm w-full"
>
  <table class="w-full text-left border-collapse">
    <thead class="bg-slate-50 text-slate-600 text-xs uppercase tracking-wider">
      <tr>
        <th *ngFor="let col of columns" class="p-4 font-semibold border-b">
          {{ col.label }}
        </th>
        <th
          *ngIf="actions.length > 0"
          class="p-4 font-semibold border-b text-center"
        >
          Actions
        </th>
      </tr>
    </thead>
    <tbody class="divide-y divide-slate-100 w">
      <tr
        *ngFor="let row of data"
        class="hover:bg-slate-50/80 transition-colors"
      >
        <td *ngFor="let col of columns" class="p-4 text-sm text-slate-700">
          <ng-container [ngSwitch]="col.type">
            <span *ngSwitchCase="'currency'" class="font-bold">
              {{
                getProperty(row, col.key) | currency: "THB" : "symbol" : "1.2-2"
              }}
            </span>
            <span *ngSwitchCase="'date'">
              {{ getProperty(row, col.key) | date: "dd MMM yyyy HH:mm" }}
            </span>
            <span *ngSwitchDefault>{{ getProperty(row, col.key) }}</span>
          </ng-container>
        </td>
        <td class="p-4 text-right">
          <div class="flex justify-end gap-2">
            <ng-container *ngFor="let action of actions">
              <button
                *ngIf="!action.showIf || action.showIf(row)"
                (click)="action.callback(row)"
                [class]="action.class"
              >
                {{ action.label }}
              </button>
            </ng-container>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
  <div
    class="hidden sm:flex sm:flex-1 sm:items-center sm:justify-between px-5 border-t-2"
  >
    <div>
      <p class="text-sm text-slate-500">
        Showing
        <span class="font-medium text-slate-700">{{ startIndex + 1 }}</span> to
        <span class="font-medium text-slate-700">{{ endIndex }}</span> of
        <span class="font-medium text-slate-700">{{ data.length }}</span>
        results
      </p>
    </div>
    <div>
      <nav
        class="isolate inline-flex -space-x-px rounded-md shadow-sm"
        aria-label="Pagination"
      >
        <button
          (click)="prevPage()"
          [disabled]="currentPage === 1"
          class="relative inline-flex items-center rounded-l-md px-2 py-2 text-gray-400 ring-1 ring-inset ring-gray-300 hover:bg-gray-50 focus:z-20 focus:outline-offset-0 disabled:opacity-30"
        >
          <span class="material-symbols-outlined text-sm">chevron_left</span>
        </button>

        <button
          *ngFor="let page of [].constructor(totalPages); let i = index"
          (click)="goToPage(i + 1)"
          [class]="
            currentPage === i + 1
              ? 'relative z-10 inline-flex items-center bg-red-600 px-4 py-2 text-sm font-semibold text-white focus:z-20 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-red-600'
              : 'relative inline-flex items-center px-4 py-2 text-sm font-semibold text-gray-900 ring-1 ring-inset ring-gray-300 hover:bg-gray-50 focus:z-20 focus:outline-offset-0'
          "
        >
          {{ i + 1 }}
        </button>

        <button
          (click)="nextPage()"
          [disabled]="currentPage === totalPages"
          class="relative inline-flex items-center rounded-r-md px-2 py-2 text-gray-400 ring-1 ring-inset ring-gray-300 hover:bg-gray-50 focus:z-20 focus:outline-offset-0 disabled:opacity-30"
        >
          <span class="material-symbols-outlined text-sm">chevron_right</span>
        </button>
      </nav>
    </div>
  </div>
</div>
