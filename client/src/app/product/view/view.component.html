<div class="p-8 bg-slate-50 min-h-screen">
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
    <div>
      <h1 class="text-3xl font-bold text-slate-900">Product Master</h1>
      <p class="text-slate-500">จัดการข้อมูลสินค้าและตรวจสอบสต็อกรวมทั้งหมด</p>
    </div>
    <button (click)="goToCreate()"
            class="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-2xl font-bold shadow-lg shadow-red-100 flex items-center gap-2 transition-all active:scale-95">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
      </svg>
      Add New Product
    </button>
  </div>

  <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 mb-6 flex items-center gap-4">
    <div class="relative flex-1">
      <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </span>
      <input type="text" [(ngModel)]="searchTerm" (input)="onSearch()"
             placeholder="Search by SKU, Name, or Category..."
             class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-red-500 transition-all">
    </div>
  </div>

  <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
    <table class="w-full text-left border-collapse">
      <thead class="bg-slate-50 border-b border-slate-100">
        <tr>
          <th class="px-6 py-4 text-sm font-bold text-slate-600 uppercase tracking-wider">SKU & Product</th>
          <th class="px-6 py-4 text-sm font-bold text-slate-600 uppercase tracking-wider">Category</th>
          <th class="px-6 py-4 text-sm font-bold text-slate-600 uppercase tracking-wider text-right">Price</th>
          <th class="px-6 py-4 text-sm font-bold text-slate-600 uppercase tracking-wider text-center">In Stock</th>

        </tr>
      </thead>
      <tbody class="divide-y divide-slate-50">
        <tr *ngFor="let product of filteredProducts" class="hover:bg-slate-50/50 transition-colors">
          <td class="px-6 py-5">
            <div class="flex flex-col">
              <span class="text-xs font-bold text-red-600 uppercase">{{ product.sku }}</span>
              <span class="text-base font-semibold text-slate-800">{{ product.name }}</span>
            </div>
          </td>
          <td class="px-6 py-5">
            <span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-lg text-xs font-bold uppercase">
              {{ product.category || 'Uncategorized' }}
            </span>
          </td>
          <td class="px-6 py-5 text-right font-mono text-slate-700 font-semibold">
            {{ formatPrice(product.price) }}
          </td>
          <td class="px-6 py-5 text-center">
            <div [ngClass]="{
              'bg-emerald-50 text-emerald-600': product.STOCK > 10,
              'bg-amber-50 text-amber-600': product.STOCK <= 10 && product.STOCK > 0,
              'bg-red-50 text-red-600': product.STOCK <= 0
            }" class="inline-flex items-center px-4 py-1.5 rounded-full text-sm font-bold">
              {{ product.stock | number }} Unit
            </div>
          </td>

        </tr>

        <tr *ngIf="filteredProducts.length === 0 && !loading">
          <td colspan="5" class="px-6 py-20 text-center text-slate-400 font-medium">
            No products found...
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
