<div class="w-full ">
  <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden w-full">

    <div class="bg-slate-900 p-8 text-white">
      <h1 class="text-2xl font-bold">Adjust Stock</h1>
      <p class="text-slate-400 text-sm mt-1">Product ID: {{ productId }}</p>
      <div class="mt-4 p-4 bg-slate-800 rounded-2xl flex justify-between items-center border border-slate-700">
        <div>
          <p class="text-xs text-slate-500 uppercase font-bold tracking-wider">Product Name</p>
          <p class="text-lg font-semibold">{{ productName }}</p>
        </div>
        <div class="text-right">
          <p class="text-xs text-slate-500 uppercase font-bold tracking-wider">Current Stock</p>
          <p class="text-2xl font-mono text-red-500">{{ currentQty }}</p>
        </div>
      </div>
    </div>

    <form [formGroup]="adjustForm" (ngSubmit)="onSubmit()" class="p-8 space-y-6">

      <div class="flex gap-4 p-1 bg-slate-100 rounded-2xl">
        <button type="button" (click)="adjustForm.patchValue({type: 'ADD'})"
          [class]="adjustForm.get('type')?.value === 'ADD' ? 'bg-white shadow-md text-green-600' : 'text-slate-500'"
          class="flex-1 py-3 rounded-xl font-bold transition-all flex items-center justify-center gap-2">
          <span>+ เพิ่มสต็อก</span>
        </button>
        <button type="button" (click)="adjustForm.patchValue({type: 'SUBTRACT'})"
          [class]="adjustForm.get('type')?.value === 'SUBTRACT' ? 'bg-white shadow-md text-red-600' : 'text-slate-500'"
          class="flex-1 py-3 rounded-xl font-bold transition-all flex items-center justify-center gap-2">
          <span>- ลดสต็อก</span>
        </button>
      </div>

      <div class="grid grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">จำนวนที่ปรับปรุง</label>
          <input type="number" formControlName="amount"
            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none font-mono text-xl">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">ยอดใหม่ในระบบ</label>
          <div class="w-full px-4 py-3 bg-red-50 border border-red-100 rounded-xl font-mono text-xl text-red-600 font-bold">
            {{ newTotal }}
          </div>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">เหตุผลในการปรับปรุง</label>
        <select formControlName="reason" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
          <option value="">เลือกเหตุผล...</option>
          <option *ngFor="let r of reasons" [value]="r.value">{{ r.label }}</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">หมายเหตุเพิ่มเติม</label>
        <textarea formControlName="note" rows="3"
          class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none"
          placeholder="ระบุรายละเอียด เช่น เลขที่ใบเคลม หรือชื่อผู้ทำของเสียหาย..."></textarea>
      </div>

      <div class="flex gap-4 pt-4">
        <button type="button" (click)="router.navigate(['/dashboard/stock'])"
          class="flex-1 py-4 text-slate-500 font-bold hover:bg-slate-50 rounded-2xl transition-all">
          ยกเลิก
        </button>
        <button type="submit" [disabled]="adjustForm.invalid || newTotal < 0"
          class="flex-[2] py-4 bg-red-600 text-white font-bold rounded-2xl shadow-lg shadow-red-200 hover:bg-red-700 disabled:bg-slate-300 disabled:shadow-none transition-all">
          ยืนยันการปรับปรุง
        </button>
      </div>
      <p *ngIf="newTotal < 0" class="text-center text-red-500 text-xs mt-2 italic font-medium">
        * คำเตือน: สต็อกติดลบไม่ได้ กรุณาตรวจสอบจำนวนอีกครั้ง
      </p>

    </form>
  </div>
</div>
