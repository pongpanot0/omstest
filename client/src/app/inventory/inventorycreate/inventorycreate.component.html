<div class=" mx-auto p-6 space-y-6">
  <form [formGroup]="stockForm" (ngSubmit)="onSubmit()" class="space-y-6">

    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div>
          <label class="block text-sm font-medium text-slate-700">Reference / PO Number</label>
          <input type="text" formControlName="poNumber"
                 class="mt-1 w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none transition-all"
                 placeholder="e.g. PO-2026-001">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700">Supplier Name</label>
          <select formControlName="supplier" class="mt-1 w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl outline-none">
            <option value="">Select Supplier</option>
            <option value="S01"> Global Logistics</option>
            <option value="S02">Premium Meat Co., Ltd.</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700">Receive Date</label>
          <input type="date" formControlName="receiveDate" class="mt-1 w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl outline-none">
        </div>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
      <div class="p-6 border-b border-slate-100 flex justify-between items-center">

        <span class="text-xs bg-slate-100 px-2 py-1 rounded text-slate-500">Items: {{ items.length }}</span>
      </div>

      <div class="p-0 overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead class="bg-slate-50/50 text-slate-500 text-[11px] uppercase tracking-wider">
            <tr>
              <th class="p-4 font-semibold">Product</th>
              <th class="p-4 font-semibold w-24">Quantity</th>
              <th class="p-4 font-semibold w-20">Unit</th>

              <th class="p-4 font-semibold">Expiry Date</th>
              <th class="p-4 text-center">Action</th>
            </tr>
          </thead>
          <tbody formArrayName="items" class="divide-y divide-slate-100">
            <tr *ngFor="let item of items.controls; let i = index" [formGroupName]="i" class="hover:bg-slate-50/50">
              <td class="p-4 min-w-[250px]">
                <select formControlName="productId" (change)="onProductChange(i)"
                        class="w-full px-3 py-1.5 border border-slate-200 rounded-lg text-sm outline-none">
                  <option value="">Choose Product...</option>
                  <option *ngFor="let p of products" [value]="p.id">{{ p.name }}</option>
                </select>

              </td>
              <td class="p-4">
                <input type="number" formControlName="quantity"
                       class="w-full px-3 py-1.5 border border-slate-200 rounded-lg text-sm outline-none text-center">
              </td>
              <td class="p-4 text-sm text-slate-500 font-medium">
                {{ item.get('unit')?.value || '-' }}
              </td>

              <td class="p-4">
                <input type="date" formControlName="expiryDate"
                       class="w-full px-3 py-1.5 border border-slate-200 rounded-lg text-sm outline-none">
              </td>
              <td class="p-4 text-center">
                <button type="button" (click)="removeItem(i)"
                        class="text-slate-300 hover:text-red-500 transition-colors p-2">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                  </svg>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="p-4 bg-slate-50/30">
        <button type="button" (click)="addItem()"
                class="w-full py-2.5 border-2 border-dashed border-slate-200 rounded-xl text-slate-500 hover:border-red-400 hover:text-red-600 hover:bg-red-50 transition-all font-medium text-sm flex items-center justify-center gap-2">
          <span>+ Add Another Product Item</span>
        </button>
      </div>
    </div>

    <div class="flex items-center justify-end gap-4 pt-4">
      <button type="button" (click)="router.navigate(['/dashboard/stock'])" class="text-slate-500 font-semibold px-4 hover:text-slate-700 transition-colors">
        Discard Changes
      </button>
      <button type="submit"

              class="bg-red-600 text-white px-10 py-3 rounded-2xl font-bold shadow-lg shadow-red-200 hover:bg-red-700 active:scale-95 transition-all">
        Confirm & Update Inventory
      </button>
    </div>

  </form>
</div>
